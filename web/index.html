<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>codex-m5stack-buddy simulator</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="device" aria-label="Codex Buddy simulator">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="themeName">Codex-Kitty</p>
            <h1 id="petName">Codex-Kitty</h1>
          </div>
          <div class="status-pill" id="actionPill">ready</div>
        </header>

        <section class="screen" id="screen">
          <div class="scene-stage" id="sceneStage">
            <img class="scene-layer scene-bg" id="sceneBackground" alt="">
            <img class="scene-layer scene-ground" id="sceneGround" alt="">
            <div class="scene-shadow scene-house-shadow"></div>
            <img class="scene-layer scene-house" id="sceneHouse" alt="">
            <div class="scene-shadow scene-pet-shadow"></div>
            <img class="scene-pet pet-sprite idle" id="petReference" alt="Codex-Kitty sprite">
          </div>
          <div class="state-chip scene-ui" id="stateIcon">Zz</div>
        </section>

        <section class="readout">
          <div>
            <p class="label">State</p>
            <p class="value" id="stateName">Idle</p>
          </div>
          <div>
            <p class="label">Mood</p>
            <p class="value" id="mood">sleepy</p>
          </div>
          <p class="message" id="message">Codex-Kitty is resting between turns.</p>
          <div class="pomodoro-readout" id="pomodoroPanel">
            <p class="label">Pomodoro</p>
            <p class="value" id="pomodoroTime">--:--</p>
            <p class="message" id="pomodoroMode">Off</p>
            <p class="message" id="pomodoroCycle">Cycle 0</p>
          </div>
        </section>

        <section class="controls" aria-label="Simulator controls">
          <label>
            <span>Skin</span>
            <select id="skinSelect"></select>
          </label>
          <label>
            <span>State</span>
            <select id="stateSelect"></select>
          </label>
        </section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
